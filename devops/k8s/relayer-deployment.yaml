apiVersion: apps/v1
kind: Deployment
metadata:
  name: interop-relayer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: interop-relayer
  template:
    metadata:
      labels:
        app: interop-relayer
    spec:
      containers:
        - name: relayer
          image: interop/relayer:latest
          ports:
            - containerPort: 9091
