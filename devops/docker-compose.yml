version: "3.8"
services:
  sequencer:
    image: node:20
    working_dir: /app
    command: ["node", "server.js"]
    volumes:
      - ./sequencer:/app
    ports:
      - "9090:9090"
  relayer:
    image: node:20
    working_dir: /app
    command: ["node", "relayer.js"]
    volumes:
      - ./relayer:/app
    ports:
      - "9091:9091"
